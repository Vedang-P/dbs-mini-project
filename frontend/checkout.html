<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout | NexBasket</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="image/svg+xml" href="assets/brand/favicon.svg" />
  </head>
  <body>
    <header id="navbar"></header>
    <main class="site-main">
      <div class="container section-stack">
        <section class="section-head" data-reveal>
          <div>
            <h1 style="font-size:2.2rem">Checkout</h1>
            <p class="muted">Confirm your cart and place the order securely.</p>
          </div>
          <div class="quick-links">
            <a class="btn btn-ghost" href="cart.html">Back to Cart</a>
            <a class="btn btn-ghost" href="orders.html">Order History</a>
          </div>
        </section>

        <section class="card panel" data-reveal>
          <div id="status"></div>
          <div id="loadingCheckout" class="product-grid">
            <div class="skeleton sk-card"></div>
            <div class="skeleton sk-card"></div>
          </div>
          <div id="checkoutSummary"></div>
          <button id="placeOrderBtn" class="btn btn-primary" style="margin-top:14px">Place Order</button>
        </section>
      </div>
    </main>
    <footer id="footer"></footer>
    <script type="module" src="checkout.js"></script>
  </body>
</html>
