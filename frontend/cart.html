<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cart | NexBasket</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="image/svg+xml" href="assets/brand/favicon.svg" />
  </head>
  <body>
    <header id="navbar"></header>
    <main class="site-main">
      <div class="container section-stack">
        <section class="section-head" data-reveal>
          <div>
            <h1 style="font-size:2.2rem">My Cart</h1>
            <p class="muted">Review selected products before checkout.</p>
          </div>
          <div class="quick-links">
            <a class="btn btn-ghost" href="products.html">Continue Shopping</a>
            <a class="btn btn-primary" href="checkout.html">Proceed to Checkout</a>
          </div>
        </section>

        <section class="card panel" data-reveal>
          <div id="status"></div>
          <div id="loadingCart" class="product-grid">
            <div class="skeleton sk-card"></div>
            <div class="skeleton sk-card"></div>
          </div>
          <div id="cartItems" class="section-stack"></div>
          <div class="summary-box" style="margin-top:12px">
            <h3 id="totalAmount">Cart Total: ₹0.00</h3>
          </div>
        </section>
      </div>
    </main>
    <footer id="footer"></footer>
    <script type="module" src="cart.js"></script>
  </body>
</html>
